name: iosApp
options:
  bundleIdPrefix: com.naemomlab.tessera
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - iosApp
    info:
      path: iosApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.naemomlab.tessera.iosApp
        INFOPLIST_FILE: iosApp/Info.plist
        FRAMEWORK_SEARCH_PATHS:
          - "$(SRCROOT)/../tessera-core/build/bin/iosSimulatorArm64/debugFramework"
          - "$(SRCROOT)/../tessera-core/build/bin/iosArm64/debugFramework"
        OTHER_LINKER_FLAGS: "-ObjC"
    dependencies:
      - framework: "../tessera-core/build/bin/iosSimulatorArm64/debugFramework/TesseraCore.framework"
        embed: true
    preBuildScripts:
      - name: "Build KMP Framework"
        script: |
          cd "$SRCROOT/.."
          if [ "${PLATFORM_NAME}" = "iphonesimulator" ]; then
            ./gradlew :tessera-core:linkDebugFrameworkIosSimulatorArm64
          else
            ./gradlew :tessera-core:linkDebugFrameworkIosArm64
          fi
        basedOnDependencyAnalysis: false
