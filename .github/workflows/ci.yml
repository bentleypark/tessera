name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'art/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'art/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build tessera-core
        run: ./gradlew :tessera-core:assembleDebug

      - name: Build tessera-glide
        run: ./gradlew :tessera-glide:assembleDebug

      - name: Run common tests
        run: ./gradlew :tessera-core:testDebugUnitTest

      - name: Build sample app
        run: ./gradlew :sample:assembleDebug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: tessera-core/build/reports/tests/
          retention-days: 7

  ios:
    name: iOS Framework Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build iOS framework (Simulator)
        run: ./gradlew :tessera-core:linkDebugFrameworkIosSimulatorArm64

      - name: Run iOS tests
        run: ./gradlew :tessera-core:iosSimulatorArm64Test
